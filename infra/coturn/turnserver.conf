# coturn — time-limited REST credentials (use-auth-secret / "TURN REST API")
# Pairs with the Ohiyo server's GET /api/v1/ice-servers endpoint.

listening-port=3478
tls-listening-port=5349
external-ip=REPLACE_WITH_PUBLIC_IP        # REQUIRED behind NAT/cloud; for 1:1 NAT use PUBLIC/PRIVATE
min-port=49152
max-port=65535                            # open this UDP range in the firewall / security group

# Auth: the server signs short-lived creds with this exact secret.
use-auth-secret
static-auth-secret=REPLACE_WITH_LONG_RANDOM_SECRET   # MUST equal the server's TURN_SECRET byte-for-byte
realm=turn.example.com

fingerprint
no-multicast-peers
stale-nonce=600

# TLS (turns:) — drop your certs in ./certs/ as fullchain.pem + privkey.pem
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem
no-tlsv1
no-tlsv1_1

no-cli

# Block relaying to private / link-local / loopback ranges (SSRF + cloud-metadata defense)
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

user-quota=12
total-quota=1200
max-bps=0

log-file=stdout
proc-user=turnserver
proc-group=turnserver
