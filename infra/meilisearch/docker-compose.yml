# Meilisearch — full-text message search for Ohiyo.
#
# Bring it up:   docker compose -f infra/meilisearch/docker-compose.yml up -d
# Then set on the server (see server/.env.example):
#   MEILISEARCH_ENABLED=true
#   MEILISEARCH_URL=http://localhost:7700      # or http://meilisearch:7700 in a shared network
#   MEILISEARCH_API_KEY=<the MEILI_MASTER_KEY below>
#
# On first boot with search enabled, the server creates + configures the 'messages'
# index automatically. Existing messages are NOT back-indexed — see README.md.

services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: kikkacord-meilisearch
    restart: unless-stopped
    ports:
      # Loopback only — the search index holds plaintext message content and must
      # never be exposed to the internet. Reach it from the server over the host or a
      # shared private network; do NOT publish 0.0.0.0:7700.
      - "127.0.0.1:7700:7700"
    environment:
      # Generate a strong key: `openssl rand -hex 32`. MUST match the server's
      # MEILISEARCH_API_KEY. Required — compose refuses to start without it, so we
      # never ship a known/default master key.
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY (openssl rand -hex 32)}
      MEILI_ENV: production
    volumes:
      - ./data.ms:/meili_data
