# Fly.io deploy config for the Kikkacord backend.
#
# IMPORTANT: app names are globally unique on Fly. Change `app` below to your own
# (e.g. "kikkacord-acme"), then point the desktop client at it by setting
# VITE_SERVER_URL=https://<app>.fly.dev in client/.env.production.
#
# This app uses SQLite on a single attached volume, so it runs as exactly ONE
# machine (no horizontal scaling). See DEPLOY.md for the LiteFS/Postgres path
# when you outgrow a single node.

app = "kikkacord"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  BIND_ADDR = "0.0.0.0:3000"
  DATABASE_URL = "sqlite:/data/kikkacord.db"
  RUST_LOG = "server=info,tower_http=warn"
  # TURN/STUN for voice: set TURN_SECRET + TURN_URLS as secrets (see DEPLOY.md).
  STUN_URLS = "stun:stun.l.google.com:19302"

# Persists the SQLite DB (/data/kikkacord.db) AND uploaded files (/data/uploads).
[[mounts]]
  source = "kikkacord_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # A real-time chat/voice server holds long-lived WebSocket connections and
  # tracks presence — it must NOT sleep. Keep one machine always running.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    soft_limit = 800
    hard_limit = 1000

  # HTTP health check against the server's /healthz route.
  [[http_service.checks]]
    interval = "15s"
    timeout = "4s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
