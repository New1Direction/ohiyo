name: Release

# Build the desktop installers on every version tag (and on manual dispatch), and
# attach them to a DRAFT GitHub Release. When the signing secrets below are present the
# macOS build is signed + notarized and the updater artifacts are produced; with them
# unset the build still succeeds, just unsigned (first launch shows an OS warning). See
# DEPLOY.md §4 for how to obtain and set the certificates.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
          - platform: macos-latest # Intel
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ""
          # Windows is temporarily disabled: crates/goodnight (the key vault) uses
          # POSIX-only libc (mmap/mlock/getuid/RLIMIT_MEMLOCK) that doesn't compile on
          # Windows. Re-enable once it's cfg-gated with a Windows VirtualLock fallback.
          # - platform: windows-latest
          #   target: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bake the production backend URL into the bundle (https://your-app.fly.dev).
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          # macOS code-signing + notarization. UNCOMMENT these (and set the secrets — see
          # DEPLOY.md §4) to ship signed + notarized builds. They MUST stay commented out
          # while unset: passing them empty makes tauri-action run `security import` with an
          # empty cert and the macOS build fails. Commented = unsigned build (Gatekeeper
          # warning on first launch) that still produces working installers.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri auto-updater signing. Uncomment + set secrets to emit updater artifacts.
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: client
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseName: "Ohiyo v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
