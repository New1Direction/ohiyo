name: Release

# Build the desktop installers on every version tag (and on manual dispatch), and
# attach them to a DRAFT GitHub Release. macOS builds are ad-hoc signed by default
# (required so downloaded Apple Silicon apps are not reported as damaged). When the
# signing secrets below are present the macOS build is Developer ID signed + notarized
# and the updater artifacts are produced. See
# DEPLOY.md §4 for how to obtain and set the certificates.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
          - platform: macos-latest # Intel
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ""
          # Windows is temporarily disabled: crates/goodnight (the key vault) uses
          # POSIX-only libc (mmap/mlock/getuid/RLIMIT_MEMLOCK) that doesn't compile on
          # Windows. Re-enable once it's cfg-gated with a Windows VirtualLock fallback.
          # - platform: windows-latest
          #   target: ""
    runs-on: ${{ matrix.platform }}
    env:
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Require Apple notarization for public macOS tag releases
        if: matrix.platform == 'macos-latest' && github.event_name == 'push' && env.HAS_APPLE_SIGNING != 'true'
        run: |
          echo "::error::Refusing to build a public macOS release without Developer ID signing + notarization. Set APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID, then re-run the release. Use workflow_dispatch only for private ad-hoc QA builds."
          exit 1

      - name: Enable macOS Developer ID signing
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_SIGNING == 'true'
        working-directory: client
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          node -e "const fs=require('fs'); const p='src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(p,'utf8')); c.bundle.macOS.signingIdentity=process.env.APPLE_SIGNING_IDENTITY; fs.writeFileSync(p, JSON.stringify(c,null,2)+'\n');"

      - name: Build desktop installers (macOS signed + notarized)
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_SIGNING == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: client
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseName: "Ohiyo v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Verify macOS Gatekeeper trust before release
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_SIGNING == 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob
          apps=(client/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app client/src-tauri/target/release/bundle/macos/*.app)
          dmgs=(client/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg client/src-tauri/target/release/bundle/dmg/*.dmg)
          if [ ${#apps[@]} -eq 0 ]; then
            echo "::error::No .app bundle found to verify"
            find client/src-tauri/target -maxdepth 6 -type f | sort | tail -200
            exit 1
          fi
          if [ ${#dmgs[@]} -eq 0 ]; then
            echo "::error::No .dmg bundle found to verify"
            find client/src-tauri/target -maxdepth 6 -type f | sort | tail -200
            exit 1
          fi
          for app in "${apps[@]}"; do
            echo "Verifying app signature: $app"
            codesign --verify --deep --strict --verbose=2 "$app"
            spctl -a -vvv -t execute "$app"
          done
          for dmg in "${dmgs[@]}"; do
            echo "Verifying notarized DMG: $dmg"
            xcrun stapler validate "$dmg"
            spctl -a -vvv -t install "$dmg"
          done

      - name: Build desktop installers (macOS ad-hoc fallback for private QA only)
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_SIGNING != 'true' && github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
        with:
          projectPath: client
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseName: "Ohiyo v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Build desktop installers (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
        with:
          projectPath: client
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseName: "Ohiyo v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
