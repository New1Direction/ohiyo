name: CI

on:
  push:
    branches: [main]
  pull_request:

# Quality gate so regressions can't merge. Every step is a hard gate — a failing
# format check, lint, build, or test blocks the merge.
jobs:
  client:
    name: Client (lint · types · unit · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          # Node 22: the unit tests run via the built-in runner with native TS
          # type-stripping (--experimental-strip-types), available from 22.6+.
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - name: ESLint (hooks correctness + a11y)
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:unit
      - name: Production build
        run: npm run build

  server:
    name: Server (build · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Build
        run: cargo build --locked
      - name: Test
        run: cargo test --locked
