version: 2
updates:
  # npm updates are intentionally disabled for launch. GitHub's Dependabot runner
  # currently injects a GitHub Packages registry credential for this repo and
  # fails without an .npmrc/scope. Re-enable once the npm registry config is
  # explicit.
  - package-ecosystem: cargo
    directory: /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
  - package-ecosystem: cargo
    directory: /client/src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
